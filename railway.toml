# Railway deployment config for the Prism API (the web service).
#
# Railway injects $PORT and, via its Postgres/Redis plugins, DATABASE_URL and
# REDIS_URL — which prism.common.config reads directly. Set the remaining
# secrets (ANTHROPIC_API_KEY, OPENAI_API_KEY, SERPAPI_KEY, RESEND_API_KEY,
# PRISM_API_KEY, CORS_ALLOW_ORIGINS, ...) as service variables in the dashboard.
#
# The start command runs docker/start-api.sh: apply the idempotent schema, then
# exec uvicorn. It is a script (not an inline "migrate && uvicorn ...") because
# Railway may exec the start command without a shell, turning "&&" into a literal
# arg so uvicorn never starts (symptom: "migration complete", no server). The
# script also binds uvicorn to `::` so Railway's IPv6 healthcheck/edge proxy can
# reach it — a 0.0.0.0 bind passes locally but fails the healthcheck in prod.
#
# The background workers (normaliser, scorer, prefect-worker) are deployed as
# separate Railway services using the same image with their own start commands —
# see DEPLOY.md.
#
# IMPORTANT: a "Custom Start Command" set in the Railway dashboard OVERRIDES this
# startCommand. Clear that field so this one is used.

[build]
builder = "DOCKERFILE"
dockerfilePath = "docker/Dockerfile"

[deploy]
startCommand = "sh start-api.sh"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
healthcheckPath = "/healthz"
