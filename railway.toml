# Railway deployment config for the Prism API (the web service).
#
# Railway injects $PORT and, via its Postgres/Redis plugins, DATABASE_URL and
# REDIS_URL — which prism.common.config reads directly. Set the remaining
# secrets (ANTHROPIC_API_KEY, OPENAI_API_KEY, SERPAPI_KEY, RESEND_API_KEY,
# PRISM_API_KEY, CORS_ALLOW_ORIGINS, ...) as service variables in the dashboard.
#
# The start command runs docker/start-api.sh: apply the idempotent schema, then
# exec uvicorn. It is a script (not an inline "migrate && uvicorn ...") because
# Railway may exec the start command without a shell, turning "&&" into a literal
# arg so uvicorn never starts (symptom: "migration complete", no server). The
# script binds uvicorn to 0.0.0.0 — this service's healthcheck connects over
# IPv4, and an IPv6-only `::` bind fails the healthcheck even with uvicorn up.
#
# This file configures the API service ONLY. Railway's config-as-code is
# per-service: a single railway.toml describes one service, and by default every
# service created from this repo reads THIS file at the repo root — so a worker
# created without its own config would wrongly run the API's "sh start-api.sh".
#
# The background workers are separate Railway services using the same image with
# their own config files; point each service at its file via Settings ->
# Config-as-code path:
#   normaliser     -> railway.normaliser.toml   (python -m prism.normaliser.worker)
#   scorer         -> python -m prism.ai.scorer        (own file or dashboard cmd)
#   prefect-worker -> python -m prism.flows.dag        (own file or dashboard cmd)
# See DEPLOY.md.
#
# IMPORTANT: a "Custom Start Command" set in the Railway dashboard OVERRIDES this
# startCommand. Clear that field so this one is used.

[build]
builder = "DOCKERFILE"
dockerfilePath = "docker/Dockerfile"

[deploy]
startCommand = "sh start-api.sh"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
healthcheckPath = "/healthz"
