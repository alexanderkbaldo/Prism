# Full Prism stack for local development.
#
#   docker compose up -d --build
#
# Brings up: Postgres (with schema), Redis, the Prefect server + worker that
# serves the scraper deployments, and the always-on normaliser. The scrapers
# themselves run inside the prefect-worker process on their daily cron; trigger
# one immediately with:
#
#   docker compose exec prefect-worker python -m prism.flows.dag run sentiment

x-app-env: &app-env
  REDIS_URL: redis://redis:6379/0
  DATABASE_URL: postgresql://prism:prism@postgres:5432/prism
  ALLOW_SAMPLE_DATA: "true"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: prism
      POSTGRES_PASSWORD: prism
      POSTGRES_DB: prism
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prism"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Prefect server (UI + API) at http://localhost:4200
  prefect-server:
    image: prefecthq/prefect:3-latest
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    environment:
      PREFECT_SERVER_API_HOST: 0.0.0.0
      PREFECT_API_URL: http://localhost:4200/api
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; urllib.request.urlopen('http://localhost:4200/api/health'); sys.exit(0)\""]
      interval: 10s
      timeout: 5s
      retries: 12

  # Serves the scraper deployments and runs them on their daily cron.
  prefect-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: python -m prism.flows.dag
    environment:
      <<: *app-env
      PREFECT_API_URL: http://prefect-server:4200/api
    depends_on:
      prefect-server:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # Always-on consumer of the Redis stream. Scale with: --scale normaliser=3
  normaliser:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: python -m prism.normaliser.worker
    environment:
      <<: *app-env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Query API (FastAPI) at http://localhost:8000  (docs at /docs)
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: uvicorn prism.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      <<: *app-env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
